<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Ivy!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ffd93d;
            --text-dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            background: var(--glass);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
        }

        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; }

        .message { font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; color: #4b4b4b; }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }

        .unit {
            background: white;
            padding: 15px 5px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .unit span { display: block; font-weight: 800; font-size: 1.5rem; color: var(--primary); }
        .unit label { font-size: 0.65rem; text-transform: uppercase; color: #95a5a6; }

        .btn-celebrate {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        audio { width: 100%; height: 35px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Happy Birthday, Ivyl! 🎂</h1>
    <p class="message">Belated wishes for yesterday! The countdown to your next big celebration has already begun. You're the best sister!</p>

    <div class="countdown" id="timer">
        <div class="unit"><span id="days">00</span><label>Days</label></div>
        <div class="unit"><span id="hours">00</span><label>Hours</label></div>
        <div class="unit"><span id="mins">00</span><label>Mins</label></div>
        <div class="unit"><span id="secs">00</span><label>Secs</label></div>
    </div>

    <div class="controls">
        <button class="btn-celebrate" onclick="triggerConfetti()">Early Celebration! ✨</button>
        <div class="player">
            <audio controls id="audioPlayer">
                <source src="saavane-happy-birthday-254480.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>
</div>

<script>
    // Updated for next year: March 18, 2027
    const nextBirthday = new Date("March 18, 2027 00:00:00").getTime();

    function triggerConfetti() {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 }
        });
    }

    const timer = setInterval(() => {
        const now = new Date().getTime();
        const diff = nextBirthday - now;

        if (diff <= 0) {
            clearInterval(timer);
            document.getElementById('timer').innerHTML = "<h2>PARTY TIME! 🥳</h2>";
            triggerConfetti();
            return;
        }

        document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
        document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
        document.getElementById('mins').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        document.getElementById('secs').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
    }, 1000);
</script>

</body>
</html>
