<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Ivy!</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ffd93d;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 15px;
            overflow-x: hidden;
        }

        .card {
            background: var(--glass);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        /* Feature 1: Photo Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid white;
            transition: transform 0.3s;
        }

        .gallery img:hover { transform: scale(1.05); }

        /* Feature 2: Floating Emojis */
        .floating-emoji {
            position: fixed;
            bottom: -50px;
            font-size: 2rem;
            user-select: none;
            z-index: 1;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .unit { background: white; padding: 10px; border-radius: 12px; }
        .unit span { display: block; font-weight: 800; font-size: 1.5rem; color: var(--primary); }

        .btn-celebrate {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="greeting">Hello, Ivy!</h2>
    <h1>Happy Birthday! 🎂</h1>
    
    <div class="gallery">
        <img src="photo1.jpg" alt="Memory 1">
        <img src="photo2.jpg" alt="Memory 2">
    </div>

    <p id="personalMessage">Belated wishes for yesterday! Here is the countdown to your 2027 celebration.</p>

    <div class="countdown" id="timer">
        <div class="unit"><span id="days">00</span><label>Days</label></div>
        <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
        <div class="unit"><span id="mins">00</span><label>Min</label></div>
        <div class="unit"><span id="secs">00</span><label>Sec</label></div>
    </div>

    <button class="btn-celebrate" onclick="triggerConfetti()">More Magic! ✨</button>
    
    <audio controls>
        <source src="saavane-happy-birthday-254480.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    // Configuration
    const nextBirthday = new Date("March 18, 2027 00:00:00").getTime();

    // Feature 2: Dynamic Greeting
    const hour = new Date().getHours();
    const greetingMsg = hour < 12 ? "Good Morning, Ivy! ☀️" : hour < 18 ? "Good Afternoon, Ivy! 🌸" : "Good Evening, Ivy! 🌙";
    document.getElementById('greeting').innerText = greetingMsg;

    // Feature 3: Emoji Rain
    function createEmoji() {
        const emojis = ['❤️', '🎂', '✨', '🎈', '🎁'];
        const e = document.createElement('div');
        e.className = 'floating-emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + "vw";
        e.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 6000);
    }
    setInterval(createEmoji, 500);

    // Confetti & Timer Logic
    function triggerConfetti() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    setInterval(() => {
        const now = new Date().getTime();
        const diff = nextBirthday - now;
        document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
        document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
        document.getElementById('mins').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        document.getElementById('secs').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
    }, 1000);
</script>

</body>
</html>
